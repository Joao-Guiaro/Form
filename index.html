<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    
    <header></header>
    <br><br>
    <main>
    <form>
        <h2>Cadastro de Usuário</h2><br><br>

        <!-- Campo para colocar o nome -->
         <div>
        <input type="text" id="nome" placeholder="Nome"><br>
        
        </div>
        
        <p id="verinome"></p>

        <!-- Campo para colocar o email -->
        <div>
            <input type="text" id="email" placeholder="Email">
        </div>
        
        <!-- Parágrafo para mostrar se o email está válido -->
        <p id="veriemail"></p>
        
        <!-- Campo para colocar a senha -->
        <div id="inputsenha">
            <input type="password" id="senha" placeholder="Senha">
            
            <!-- Botão para ver a senha -->
            <i class="bi bi-eye-fill icone" title="Ver senha"></i>
        </div>

        <!-- Parágrafo para verificar a senha -->
        <p id="verisenha"></p>

        <!-- Campo para confirmar a senha -->
        <div id="inputconfirma">
            <input type="password" id="senhac" placeholder="Confirmar Senha">
        </div>

        <!-- Parágrafo para mostrar se a senha foi reescrita corretamente -->
        <p id="vericonfirma"></p>

        <div id="telefones">

            <!-- Campo para colocar o telefone -->
            <div class="inputtelefone">

                <div class="campotelefone">
                <input type="text" class="telefone" placeholder="Telefone: (99) 99999-9999" title="Use o formato (99)99999-9999">
                
                <!-- Botão para adicionar outro telefone -->
                <i  class="bi bi-plus-square mais primeiro" title="Adicionar telefone"></i>
                </div>
                 <!-- Parágrafo para mostrar se o telefone foi escrito corretamente -->
                <p class="veritelefone"></p>
            </div>
        </div>

        <!-- p para ter espaçamento entre campos -->
        <p></p>

        <!-- Campo para colocar o CEP -->
        <div class="cep">
  
            <input type="text" id="cep" placeholder="CEP: 99999-999" title="Use o formato 99999-999">
            <p id="vericep"></p>
        </div>
        
        <p></p>

        <!-- Botão para enviar o formulário -->
        <button type="button" id="cadastrar" title="Cadastrar usuário">Cadastrar</button>
        
        <!-- Parágrafo para dizer se o formulário foi enviado ou não -->
        <p id="mensagem"></p>
    </form>
    </main>
    <script src="script.js"></script>

</body>

</html>
